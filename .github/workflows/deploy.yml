name: Build and Deploy

# Triggers: automatic on pushes to main, or manually via the GitHub Actions UI
on:
    push:
        branches:
            - main
    workflow_dispatch:

env:
    IMAGE_NAME: poor-jimmy

jobs:
    build-and-push:
        # Native ARM64 runner — no QEMU emulation needed
        runs-on: ubuntu-24.04-arm

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # Buildx is required for multi-platform builds; kept here in case
            # additional platforms are added later
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # Authenticate with DockerHub using repository secrets
            - name: Log in to DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            # Generate image tags:
            #   - "latest" (only on the default branch)
            #   - date-based tag in YYYY-MM-DD format
            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=raw,value={{date 'YYYY-MM-DD'}}

            # Build the image for ARM64 and push to DockerHub
            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  platforms: linux/arm64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  # Cache layers in GitHub Actions cache to speed up subsequent builds
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
